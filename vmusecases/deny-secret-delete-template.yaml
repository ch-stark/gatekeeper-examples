apiVersion: templates.gatekeeper.sh/v1
kind: ConstraintTemplate
metadata:
  name: denysecretdeleteifusedbyvm
spec:
  crd:
    spec:
      names:
        kind: DenySecretDeleteIfUsedByVM
  targets:
    - target: admission.k8s.gatekeeper.sh
      rego: |
        package denysecretdeleteifusedbyvm

        violation[{"msg": msg}] {
          input.review.operation == "DELETE"
          secret_name := input.review.oldObject.metadata.name
          ns := input.review.oldObject.metadata.namespace

          vms := data.inventory.namespace[ns]["kubevirt.io/v1"]["VirtualMachine"]
          vm := vms[_]
          volumes := vm.spec.template.spec.volumes[_]

          # Check cloud-init secret references (NoCloud and ConfigDrive)
          cloudinit_secret_match(volumes, secret_name)

          msg := sprintf("Secret '%s' is used by VirtualMachine '%s' for cloud-init. Detach it before deleting.", [secret_name, vm.metadata.name])
        }

        cloudinit_secret_match(volume, secret_name) {
          volume.cloudInitNoCloud.networkDataSecretRef.name == secret_name
        }

        cloudinit_secret_match(volume, secret_name) {
          volume.cloudInitNoCloud.userData == secret_name
        }

        cloudinit_secret_match(volume, secret_name) {
          volume.cloudInitConfigDrive.networkDataSecretRef.name == secret_name
        }

        cloudinit_secret_match(volume, secret_name) {
          volume.cloudInitConfigDrive.userData == secret_name
        }

        # Also check accessCredentials for SSH key secrets
        violation[{"msg": msg}] {
          input.review.operation == "DELETE"
          secret_name := input.review.oldObject.metadata.name
          ns := input.review.oldObject.metadata.namespace

          vms := data.inventory.namespace[ns]["kubevirt.io/v1"]["VirtualMachine"]
          vm := vms[_]
          creds := vm.spec.template.spec.accessCredentials[_]

          ssh_secret_match(creds, secret_name)

          msg := sprintf("Secret '%s' is used by VirtualMachine '%s' for SSH access credentials. Remove the reference before deleting.", [secret_name, vm.metadata.name])
        }

        ssh_secret_match(cred, secret_name) {
          cred.sshPublicKey.source.secret.secretName == secret_name
        }

        ssh_secret_match(cred, secret_name) {
          cred.userPassword.source.secret.secretName == secret_name
        }
